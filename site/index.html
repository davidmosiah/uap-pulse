<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>PURSUE · Declassified UAP Files — uap-pulse</title>
<meta name="description" content="An interactive map of the Pentagon's declassified UAP/UFO files (PURSUE Release, war.gov, 2026). 161 government records, 1944–2026. Open data, open MCP." />
<meta property="og:title" content="PURSUE — The Pentagon's Declassified UAP Files" />
<meta property="og:description" content="161 declassified government UAP records on a live map. Your AI agent can query them too — open MCP." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Major+Mono+Display&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#04060d; --ink:#d6e6ff; --dim:#6b7a99; --line:rgba(120,160,255,.14);
    --war:#ff3b6b; --fbi:#ffcf3b; --nasa:#3bd1ff; --state:#9b5bff; --accent:#3bd1ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:'Space Mono',ui-monospace,Menlo,monospace;overflow:hidden;cursor:crosshair}
  #globe{position:fixed;inset:0;z-index:0}
  /* scanline + vignette overlay for the "declassified archive" feel */
  .fx{position:fixed;inset:0;z-index:2;pointer-events:none}
  .fx.scan{background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0 2px,rgba(0,10,30,.16) 2px 3px);mix-blend-mode:overlay;opacity:.5}
  .fx.vig{background:radial-gradient(ellipse at center,transparent 52%,rgba(0,0,0,.72) 100%)}
  .ui{position:fixed;z-index:3}
  /* ---- header ---- */
  .top{top:26px;left:30px;max-width:min(46vw,520px)}
  .stamp{display:inline-block;border:2px solid var(--war);color:var(--war);
    font:700 11px/1 'Space Mono';letter-spacing:.34em;padding:5px 9px;border-radius:3px;
    transform:rotate(-3deg);opacity:.9;text-shadow:0 0 12px rgba(255,59,107,.6)}
  h1{font-family:'Major Mono Display','Space Mono',monospace;font-weight:400;
    font-size:clamp(34px,5.4vw,68px);margin:14px 0 4px;letter-spacing:.04em;
    text-shadow:0 0 26px rgba(59,209,255,.45),0 0 4px rgba(155,91,255,.5)}
  .sub{color:var(--dim);font-size:13px;letter-spacing:.06em;line-height:1.5}
  .sub b{color:var(--ink)}
  /* ---- legend ---- */
  .legend{top:26px;right:30px;text-align:right;font-size:12px;letter-spacing:.04em}
  .legend .row{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin:5px 0;
    cursor:pointer;opacity:.55;transition:opacity .2s;user-select:none}
  .legend .row.on{opacity:1}
  .legend .dot{width:9px;height:9px;border-radius:50%;box-shadow:0 0 10px currentColor}
  /* ---- era filter ---- */
  .eras{bottom:96px;left:50%;transform:translateX(-50%);display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:94vw}
  .eras button{background:rgba(10,18,38,.6);border:1px solid var(--line);color:var(--dim);
    font:700 10.5px/1 'Space Mono';letter-spacing:.12em;padding:8px 12px;border-radius:20px;
    cursor:pointer;backdrop-filter:blur(6px);transition:.18s;text-transform:uppercase}
  .eras button:hover{color:var(--ink);border-color:var(--accent)}
  .eras button.on{color:#04060d;background:var(--accent);border-color:var(--accent);box-shadow:0 0 18px rgba(59,209,255,.5)}
  /* ---- footer bar ---- */
  .bar{bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:22px;align-items:center;
    background:rgba(8,14,30,.62);border:1px solid var(--line);border-radius:30px;
    padding:11px 24px;backdrop-filter:blur(8px);font-size:12px}
  .bar .n{color:var(--accent);font-weight:700;font-size:15px;text-shadow:0 0 12px rgba(59,209,255,.5)}
  .bar .k{color:var(--dim);letter-spacing:.06em;margin-left:5px}
  .bar a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--accent);padding-bottom:1px;transition:.15s}
  .bar a:hover{color:var(--accent);text-shadow:0 0 10px rgba(59,209,255,.6)}
  .sep{width:1px;height:26px;background:var(--line)}
  /* ---- detail panel ---- */
  .panel{top:0;right:0;height:100%;width:min(420px,90vw);background:rgba(6,10,22,.93);
    border-left:1px solid var(--line);backdrop-filter:blur(12px);transform:translateX(102%);
    transition:transform .35s cubic-bezier(.4,0,.1,1);padding:26px 26px 30px;overflow-y:auto;z-index:5}
  .panel.open{transform:none}
  .panel .x{position:absolute;top:18px;right:20px;color:var(--dim);cursor:pointer;font-size:20px;line-height:1}
  .panel h2{font-family:'Major Mono Display';font-weight:400;font-size:22px;margin:6px 40px 4px 0;letter-spacing:.03em}
  .panel .meta{color:var(--dim);font-size:11.5px;letter-spacing:.05em;margin-bottom:18px}
  .rec{border-top:1px solid var(--line);padding:14px 0}
  .rec .tag{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.12em;
    padding:3px 7px;border-radius:4px;color:#04060d;margin-right:6px;vertical-align:middle}
  .rec .ttl{font-size:12.5px;color:var(--ink);margin:8px 0 5px;line-height:1.45;word-break:break-word}
  .rec .desc{font-size:11.5px;color:var(--dim);line-height:1.55;margin-bottom:8px}
  .rec a{color:var(--accent);font-size:11px;text-decoration:none;letter-spacing:.04em}
  .rec a:hover{text-decoration:underline}
  /* ---- off-world chip ---- */
  .offworld{bottom:96px;right:30px;background:rgba(8,14,30,.62);border:1px solid var(--state);
    border-radius:14px;padding:11px 15px;font-size:11px;color:var(--state);cursor:pointer;
    backdrop-filter:blur(8px);box-shadow:0 0 18px rgba(155,91,255,.25);transition:.18s}
  .offworld:hover{background:rgba(155,91,255,.14)}
  .offworld b{color:#cbb6ff}
  /* loader */
  #load{position:fixed;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;
    background:var(--bg);color:var(--accent);font-size:13px;letter-spacing:.3em;transition:opacity .6s}
  #load.gone{opacity:0;pointer-events:none}
  .blink{animation:bl 1.1s steps(2) infinite}@keyframes bl{50%{opacity:.2}}
  @media(max-width:680px){.top{max-width:78vw;left:18px;top:18px}.legend{right:16px;top:16px}.bar{gap:12px;padding:9px 14px;font-size:10.5px}.offworld{display:none}}
</style>
</head>
<body>
  <div id="globe"></div>
  <div class="fx scan"></div>
  <div class="fx vig"></div>

  <header class="ui top">
    <span class="stamp">DECLASSIFIED</span>
    <h1>pursue</h1>
    <div class="sub">The Pentagon's declassified <b>UAP files</b>, mapped.<br>
      <b>161</b> government records · <b>1944–2026</b> · released on <b>war.gov</b>, May 2026.</div>
  </header>

  <div class="ui legend" id="legend"></div>

  <div class="ui eras" id="eras"></div>

  <div class="ui offworld" id="offworld"></div>

  <div class="ui bar">
    <span><span class="n" id="cRecords">161</span><span class="k">records</span></span>
    <span class="sep"></span>
    <span><span class="n">4</span><span class="k">agencies</span></span>
    <span class="sep"></span>
    <span><span class="n" id="cLoc">—</span><span class="k">hotspots</span></span>
    <span class="sep"></span>
    <a href="https://github.com/davidmosiah/uap-pulse" target="_blank" rel="noopener">GitHub ↗</a>
    <a href="https://www.npmjs.com/package/uap-pulse" target="_blank" rel="noopener">use the MCP ↗</a>
  </div>

  <aside class="ui panel" id="panel">
    <span class="x" id="panelX">✕</span>
    <h2 id="pTitle"></h2>
    <div class="meta" id="pMeta"></div>
    <div id="pBody"></div>
  </aside>

  <div id="load">DECRYPTING SIGNAL<span class="blink"> ▌</span></div>

<script src="https://unpkg.com/globe.gl@2.34.4/dist/globe.gl.min.js"></script>
<script>
const COLORS = {
  "Department of War":"#ff3b6b", "FBI":"#ffcf3b", "NASA":"#3bd1ff", "Department of State":"#9b5bff"
};
const ERAS = [
  ["ALL", () => true],
  ["WWII", s => s.year && s.year <= 1945],
  ["COLD WAR", s => s.year && s.year > 1945 && s.year <= 1969],
  ["MODERN", s => s.year && s.year > 1969 && s.year <= 2003],
  ["NAVY ERA", s => s.year && s.year > 2003],
];
let DB, world, activeEra = 0, hiddenAgency = new Set();

function aggregate(filterFn){
  const groups = new Map();
  for (const s of DB.sightings){
    if (s.lat==null || s.offworld) continue;
    if (!filterFn(s)) continue;
    if (hiddenAgency.has(s.agency)) continue;
    const k = s.location;
    if (!groups.has(k)) groups.set(k,{location:k,lat:s.lat,lng:s.lng,records:[],agencies:{}});
    const g = groups.get(k);
    g.records.push(s);
    g.agencies[s.agency] = (g.agencies[s.agency]||0)+1;
  }
  return [...groups.values()].map(g=>{
    const dom = Object.entries(g.agencies).sort((a,b)=>b[1]-a[1])[0][0];
    return {...g, count:g.records.length, color:COLORS[dom]||"#9fb4d6"};
  });
}

function refresh(){
  const pts = aggregate(ERAS[activeEra][1]);
  const maxC = Math.max(1, ...pts.map(p=>p.count));
  world.pointsData(pts)
    .pointLat(d=>d.lat).pointLng(d=>d.lng).pointColor(d=>d.color)
    .pointAltitude(d=>0.012 + 0.10*(d.count/maxC))
    .pointRadius(d=>0.22 + 0.55*Math.sqrt(d.count/maxC))
    .pointLabel(d=>`<div style="font-family:Space Mono,monospace;background:rgba(6,10,22,.92);border:1px solid ${d.color};padding:7px 10px;border-radius:6px;color:#d6e6ff;font-size:11px">
        <b style="color:${d.color}">${d.location}</b><br>${d.count} record${d.count>1?'s':''} · click to open</div>`);
  world.ringsData(pts)
    .ringColor(d=>(t=>`rgba(${hex2rgb(d.color)},${1-t})`))
    .ringMaxRadius(d=>2.2 + 4*(d.count/maxC))
    .ringPropagationSpeed(1.6).ringRepeatPeriod(d=>1100 - 500*(d.count/maxC));
  document.getElementById('cLoc').textContent = pts.length;
}

function hex2rgb(h){const n=parseInt(h.slice(1),16);return `${(n>>16)&255},${(n>>8)&255},${n&255}`;}

function openLocation(d){
  document.getElementById('pTitle').textContent = d.location;
  document.getElementById('pMeta').textContent = `${d.count} declassified record${d.count>1?'s':''} · ${d.lat.toFixed(1)}, ${d.lng.toFixed(1)}`;
  document.getElementById('pBody').innerHTML = d.records.map(recHTML).join('');
  document.getElementById('panel').classList.add('open');
}
function recHTML(s){
  const c = COLORS[s.agency]||'#9fb4d6';
  const link = s.link ? `<a href="${s.link}" target="_blank" rel="noopener">▸ open file on war.gov ↗</a>` : `<span style="color:#445">no file link</span>`;
  return `<div class="rec">
    <span class="tag" style="background:${c}">${s.agency.replace('Department of ','')}</span>
    <span class="tag" style="background:#26324d;color:#9fb4d6">${s.type}${s.year?' · '+s.year:''}</span>
    <div class="ttl">${esc(s.title)}</div>
    <div class="desc">${esc((s.description||'').slice(0,230))}${(s.description||'').length>230?'…':''}</div>
    ${link}</div>`;
}
function esc(t){return (t||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}

function buildLegend(){
  const el=document.getElementById('legend');
  el.innerHTML = Object.entries(COLORS).map(([a,c])=>
    `<div class="row on" data-a="${a}"><span>${a.replace('Department of ','')}</span><span class="dot" style="color:${c};background:${c}"></span></div>`).join('');
  el.querySelectorAll('.row').forEach(r=>r.onclick=()=>{
    const a=r.dataset.a;
    if(hiddenAgency.has(a)){hiddenAgency.delete(a);r.classList.add('on');}
    else{hiddenAgency.add(a);r.classList.remove('on');}
    refresh();
  });
}
function buildEras(){
  const el=document.getElementById('eras');
  el.innerHTML = ERAS.map((e,i)=>`<button data-i="${i}" class="${i===0?'on':''}">${e[0]}</button>`).join('');
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    activeEra=+b.dataset.i;
    el.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); refresh();
  });
}
function buildOffworld(){
  const ow = DB.sightings.filter(s=>s.offworld);
  const el=document.getElementById('offworld');
  el.innerHTML = `🛰️ <b>${ow.length}</b> off-world records (Moon · orbit)`;
  el.onclick=()=>{
    document.getElementById('pTitle').textContent='Off-world';
    document.getElementById('pMeta').textContent=`${ow.length} records beyond Earth — NASA mission files`;
    document.getElementById('pBody').innerHTML = ow.map(recHTML).join('');
    document.getElementById('panel').classList.add('open');
  };
}

fetch('sightings.json').then(r=>r.json()).then(db=>{
  DB=db;
  world = Globe()(document.getElementById('globe'))
    .globeImageUrl('https://unpkg.com/three-globe@2.31.0/example/img/earth-dark.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe@2.31.0/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe@2.31.0/example/img/night-sky.png')
    .atmosphereColor('#3b6bff').atmosphereAltitude(0.18)
    .onPointClick(openLocation)
    .pointsMerge(false).pointResolution(6);
  world.controls().autoRotate=true; world.controls().autoRotateSpeed=0.42; world.controls().enableDamping=true;
  world.pointOfView({lat:28,lng:35,altitude:2.4},0);
  buildLegend(); buildEras(); buildOffworld(); refresh();
  document.getElementById('panelX').onclick=()=>document.getElementById('panel').classList.remove('open');
  setTimeout(()=>document.getElementById('load').classList.add('gone'),700);
  window.addEventListener('resize',()=>{world.width(innerWidth);world.height(innerHeight);});
}).catch(e=>{document.getElementById('load').innerHTML='SIGNAL LOST — '+e;});
</script>
</body>
</html>
