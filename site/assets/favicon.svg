<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0a1430"/>
      <stop offset="100%" stop-color="#04060d"/>
    </radialGradient>
    <clipPath id="r"><rect width="32" height="32" rx="6"/></clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect width="32" height="32" fill="url(#g)"/>
    <!-- radar rings -->
    <circle cx="16" cy="16" r="11" fill="none" stroke="#3bd1ff" stroke-width="1" opacity="0.35"/>
    <circle cx="16" cy="16" r="7" fill="none" stroke="#3bd1ff" stroke-width="1" opacity="0.5"/>
    <circle cx="16" cy="16" r="3" fill="none" stroke="#3bd1ff" stroke-width="1" opacity="0.65"/>
    <!-- crosshair -->
    <line x1="16" y1="2" x2="16" y2="30" stroke="#3bd1ff" stroke-width="0.6" opacity="0.25"/>
    <line x1="2" y1="16" x2="30" y2="16" stroke="#3bd1ff" stroke-width="0.6" opacity="0.25"/>
    <!-- UAP signal blip -->
    <circle cx="21" cy="11" r="3.4" fill="#3bd1ff" opacity="0.25"/>
    <circle cx="21" cy="11" r="1.7" fill="#3bd1ff"/>
    <!-- secondary magenta blip -->
    <circle cx="11" cy="21" r="1.3" fill="#ff3b6b"/>
    <!-- scanlines -->
    <g fill="#000814" opacity="0.18">
      <rect y="3" width="32" height="1"/>
      <rect y="7" width="32" height="1"/>
      <rect y="11" width="32" height="1"/>
      <rect y="15" width="32" height="1"/>
      <rect y="19" width="32" height="1"/>
      <rect y="23" width="32" height="1"/>
      <rect y="27" width="32" height="1"/>
    </g>
  </g>
</svg>
